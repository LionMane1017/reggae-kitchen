<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reggae Kitchen | Corporate Legacy</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'rasta-red': '#CE1126', 'rasta-green': '#009B3A', 'rasta-gold': '#FCD116' },
                    animation: { 'slide-up-fade': 'slideUpFade 0.8s ease forwards', 'float': 'float 6s ease-in-out infinite' },
                    keyframes: {
                        slideUpFade: { '0%': { opacity: 0, transform: 'translateY(40px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background: #080808; 
            color: #f3f4f6; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .glass-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient-gold { background: linear-gradient(to right, #FCD116, #facc15); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SOVEREIGN AUDIO KERNEL ---
        const apiKey = "";
        const pcmToWav = (pcmData, sampleRate) => {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const generateSpeech = async (text) => {
            try {
                const processed = text
                    .replace(/ital/gi, "Eye-tahl")
                    .replace(/\$12\.99/g, "twelve dollars and ninety nine cents")
                    .replace(/\$14\.95/g, "fourteen dollars and ninety five cents")
                    .replace(/\$15\.99/g, "fifteen dollars and ninety nine cents")
                    .replace(/\$13\.99/g, "thirteen dollars and ninety nine cents")
                    .replace(/\$59\.99/g, "fifty nine dollars and ninety nine cents");

                const urlParams = new URLSearchParams(window.location.search);
                const queryKey = urlParams.get('key') || '';
                
                let base64Audio;
                if (queryKey) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${queryKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Say in a wise, professional, yet warm Jamaican Patois elder accent: ${processed}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    if (result.error) throw new Error(result.error.message);
                    base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                } else {
                    const response = await fetch('/api/tts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: processed })
                    });
                    const result = await response.json();
                    if (result.error) throw new Error(result.error);
                    base64Audio = result.audioContent;
                }

                const bin = atob(base64Audio);
                const bytes = new Int16Array(bin.length / 2);
                for (let i = 0; i < bin.length; i += 2) bytes[i / 2] = (bin.charCodeAt(i + 1) << 8) | bin.charCodeAt(i);
                return new Audio(URL.createObjectURL(pcmToWav(bytes, 24000)));
            } catch (e) {
                console.error("Audio synthesis failed:", e);
                return null;
            }
        };

        const KalebAgentLore = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ role: 'kaleb', text: "Greetings, partner. I am Kaleb. Step into the circle of legacy. Eye-tahl is vital. (Eye-tahl rhymes with a-towel). Ask me of the Sovereign Designation or our corporate pillars." }]);
            const [input, setInput] = useState('');
            const [isSpeaking, setIsSpeaking] = useState(false);
            const audioRef = useRef(null);

            useEffect(() => { lucide.createIcons(); }, [isOpen, messages, isSpeaking]);

            const speak = async (text) => {
                if (audioRef.current) audioRef.current.pause();
                setIsSpeaking(true);
                const a = await generateSpeech(text);
                if (a) {
                    audioRef.current = a;
                    a.onended = () => setIsSpeaking(false);
                    a.play();
                } else setIsSpeaking(false);
            };

            const handleSend = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                const q = input.toLowerCase();
                setMessages(prev => [...prev, { role: 'user', text: input }]);
                setInput('');
                setTimeout(async () => {
                    let r = "The history is deep, my friend. Wayne Reid saw the vision before the first bottle was capped.";
                    if (q.includes("designation") || q.includes("government") || q.includes("canada")) r = "Ah, the Sovereign Vow! We are the first Caribbean food product officially recognized and designated as a certified Canadian Product by the federal government. A historic achievement for the culture.";
                    else if (q.includes("loblaw")) r = "Loblaws saw the excellence first. They architected the label that carries the flame today. A true vanguard partnership for Wayne Reid.";
                    else if (q.includes("sobey")) r = "Sobeys brought the fire across the provinces. A national scaling strategy to reach every household.";
                    else if (q.includes("dossier") || q.includes("invest")) r = "The network is expanding. For a deeper look into the economics of Eye-tahl, simply request the dossier. The frequency of growth is high.";
                    setMessages(prev => [...prev, { role: 'kaleb', text: r }]);
                    await speak(r);
                }, 800);
            };

            return (
                <div className="fixed bottom-6 left-6 z-[300]">
                    {!isOpen ? (
                        <button onClick={() => setIsOpen(true)} className="bg-white/10 text-white p-4 rounded-full border border-white/20 backdrop-blur-xl animate-float group flex items-center space-x-3 shadow-2xl">
                            <i data-lucide="user-check" className="h-6 w-6 text-rasta-gold group-hover:scale-125 transition-transform"></i>
                            <span className="text-[10px] font-black tracking-widest uppercase hidden md:block">Legacy Ambassador Active</span>
                        </button>
                    ) : (
                        <div className="glass-card w-80 md:w-[450px] rounded-[3rem] overflow-hidden flex flex-col border border-white/10 shadow-2xl animate-slide-up-fade bg-[#080808]">
                            <div className="bg-black/80 p-6 flex justify-between items-center border-b border-white/5">
                                <div className="flex items-center space-x-4">
                                    <div className={`h-10 w-10 rounded-2xl bg-rasta-gold flex items-center justify-center text-black font-black shadow-inner ${isSpeaking ? 'animate-pulse' : ''}`}>K</div>
                                    <div><span className="block text-white font-black uppercase text-xs tracking-[0.2em]">Kaleb</span><span className="block text-zinc-500 text-[8px] uppercase tracking-widest font-mono">{isSpeaking ? 'Speaking...' : 'Legacy Ambassador'}</span></div>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="hover:rotate-90 transition-transform"><i data-lucide="x" className="h-5 w-5 text-zinc-600"></i></button>
                            </div>
                            <div className="h-80 overflow-y-auto p-6 space-y-6 no-scrollbar bg-black/20">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-5 rounded-[1.5rem] text-sm font-medium leading-relaxed group relative ${m.role === 'user' ? 'bg-white/10 text-white' : 'bg-black text-zinc-300 border border-white/5 shadow-lg'}`}>
                                            {m.text}
                                            {m.role === 'kaleb' && (
                                                <button onClick={() => speak(m.text)} className="absolute -right-8 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <i data-lucide="volume-2" className="h-4 w-4 text-rasta-gold"></i>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <form onSubmit={handleSend} className="p-6 border-t border-white/5 flex space-x-3 bg-black/40">
                                <input value={input} onChange={e => setInput(e.target.value)} placeholder="Query the Legacy..." className="flex-grow bg-white/5 rounded-2xl px-6 py-3 text-sm text-white outline-none focus:ring-1 focus:ring-rasta-gold" />
                                <button type="submit" className="bg-white text-black px-5 py-3 rounded-2xl font-black transition-all hover:bg-zinc-200 shadow-xl"><i data-lucide="chevron-right" className="h-6 w-6"></i></button>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isMobileMenuOpen]);

            const MILESTONES = [
                { partner: "Loblaws", title: "The Vanguard Partnership", desc: "Canada's largest food retailer spearheaded the label design, cementing Reggae Kitchen as a premium brand from day one." },
                { partner: "Sobeys", title: "The National Scaling", desc: "Pivotal expansion allowing the Wayne Reid legacy to span across provinces with massive mainstream viability." },
                { partner: "Maple Lodge Farms", title: "The Strategic Alliance", desc: "A fusion of titans, merging Canada's premier poultry provider with our original jerk profile for industrial-scale synergy." },
                { partner: "Gov. of Canada", title: "The Sovereign Designation", desc: "First Caribbean food product officially recognized and designated as a certified Canadian Product by the federal government." }
            ];

            return (
                <div className="min-h-screen relative pb-20">
                    <div className="w-full h-1.5 bg-gradient-to-r from-rasta-green via-rasta-gold to-rasta-red fixed top-0 z-[500]" />
                    <KalebAgentLore />
                    <nav className="fixed top-1.5 w-full z-[500] bg-black/60 backdrop-blur-2xl border-b border-white/5 py-5 shadow-2xl">
                        <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                            <div className="flex items-center space-x-4"><i data-lucide="flame" className="text-rasta-gold h-10 w-10 fire-glow"></i><h1 className="text-2xl font-black text-white uppercase tracking-tighter">Reggae <span className="text-gradient-gold">Kitchen</span></h1></div>
                            <div className="flex items-center space-x-6">
                                <a href="#" className="hidden md:flex text-zinc-500 hover:text-white text-[10px] font-black uppercase tracking-[0.3em] items-center">Investor Deck</a>
                                <a href="cards.html" className="hidden md:flex text-zinc-500 hover:text-white text-[10px] font-black uppercase tracking-[0.3em] items-center">Matrix Cards</a>
                                <a href="index.html" className="hidden md:block text-rasta-gold hover:text-white text-[11px] font-black uppercase tracking-[0.2em] border-2 border-rasta-gold/30 px-8 py-3 rounded-full transition-all shadow-lg hover:bg-rasta-gold hover:text-black">Back to Store</a>
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-3 bg-white/5 rounded-full hover:bg-rasta-gold text-white hover:text-black transition-all border border-white/10 md:hidden flex items-center justify-center">
                                    <span key={isMobileMenuOpen ? "close" : "open"} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${isMobileMenuOpen ? 'x' : 'menu'}" class="h-5 w-5"></i>` }} className="h-5 w-5 flex items-center justify-center"></span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[450] bg-black/95 backdrop-blur-3xl md:hidden flex flex-col justify-center items-center space-y-10 animate-slide-up-fade">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-rasta-green via-rasta-gold to-rasta-red"></div>
                            
                            <a href="index.html" onClick={() => setIsMobileMenuOpen(false)} className="text-3xl font-black uppercase tracking-tighter text-white hover:text-rasta-gold transition-colors flex items-center space-x-4">
                                <i data-lucide="shopping-cart" className="h-8 w-8 text-rasta-green"></i>
                                <span>Back to Store</span>
                            </a>

                            <a href="cards.html" onClick={() => setIsMobileMenuOpen(false)} className="text-3xl font-black uppercase tracking-tighter text-white hover:text-rasta-gold transition-colors flex items-center space-x-4">
                                <i data-lucide="credit-card" className="h-8 w-8 text-rasta-gold"></i>
                                <span>Matrix Cards</span>
                            </a>
                            
                            <a href="#" onClick={() => setIsMobileMenuOpen(false)} className="text-3xl font-black uppercase tracking-tighter text-white hover:text-rasta-gold transition-colors flex items-center space-x-4">
                                <i data-lucide="book-open" className="h-8 w-8 text-rasta-gold"></i>
                                <span>Investor Deck</span>
                            </a>
                        </div>
                    )}

                    <header className="pt-56 pb-20 px-8 max-w-6xl mx-auto animate-slide-up-fade">
                        <div className="inline-flex items-center bg-black/50 border border-rasta-gold/30 text-rasta-gold text-[11px] font-black px-6 py-3 rounded-full uppercase tracking-[0.4em] mb-10 shadow-inner backdrop-blur-md">
                            <i data-lucide="book-open" className="h-4 w-4 mr-3"></i> The Architect of Heat
                        </div>
                        <h1 className="text-7xl md:text-9xl font-black text-white uppercase tracking-tighter leading-[0.8] mb-14 drop-shadow-2xl">The Legend of <span className="text-gradient-gold">Wayne Reid.</span></h1>
                        <div className="glass-card p-14 md:p-20 rounded-[4rem] border-l-8 border-rasta-gold backdrop-blur-3xl shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-12 opacity-5"><i data-lucide="flame" className="h-64 w-64 text-white"></i></div>
                            <p className="text-2xl md:text-3xl text-zinc-300 font-bold leading-relaxed relative z-10">Wayne Reid isolated the precise volatile oils of the scotch bonnet to engineer a culinary paradigm shift. This is the history of uncompromising authenticity and corporate excellence.</p>
                        </div>
                    </header>

                    <section className="py-24 px-8 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 relative z-10">
                        {MILESTONES.map((s, i) => (
                            <div key={i} className="glass-card p-12 rounded-[3.5rem] group hover:border-rasta-gold/50 transition-all duration-700 hover:bg-black/80 shadow-2xl">
                                <span className="text-rasta-gold text-[11px] font-black uppercase tracking-[0.3em] mb-3 block">{s.partner}</span>
                                <h3 className="text-4xl font-black text-white uppercase mb-6 tracking-tight leading-none transition-colors group-hover:text-rasta-gold">{s.title}</h3>
                                <p className="text-zinc-400 leading-relaxed font-bold text-lg">{s.desc}</p>
                            </div>
                        ))}
                    </section>

                    <section className="py-40 px-8 max-w-5xl mx-auto text-center animate-slide-up-fade">
                        <div className="glass-card p-20 rounded-[5rem] border border-white/10 shadow-[0_0_80px_rgba(255,255,255,0.05)]">
                            <i data-lucide="briefcase" className="h-16 w-16 text-zinc-600 mx-auto mb-8"></i>
                            <h2 className="text-5xl md:text-6xl font-black text-white uppercase mb-8 tracking-tighter leading-none">Corporate Hub</h2>
                            <p className="text-zinc-400 mb-14 font-bold text-xl max-w-2xl mx-auto">Request the complete dossier for expansion logistics, global supply chain data, and franchise opportunities.</p>
                            <button className="bg-white text-black font-black uppercase tracking-[0.3em] px-14 py-7 rounded-full hover:bg-zinc-200 transition-all shadow-2xl active:scale-95 text-sm">Request Dossier</button>
                        </div>
                    </section>

                    <footer className="py-24 text-center bg-[#050505] border-t border-white/5">
                        <h2 className="text-white font-black uppercase tracking-[0.5em] text-lg mb-4 text-gradient-gold">Reggae Kitchen Corporate</h2>
                        <div className="mb-8 flex flex-wrap justify-center gap-6">
                            <a href="index.html" className="inline-flex items-center space-x-2 text-xs font-black uppercase tracking-widest text-zinc-500 hover:text-rasta-gold transition-colors">
                                <i data-lucide="shopping-cart" className="h-3.5 w-3.5"></i>
                                <span>Back to Store</span>
                            </a>
                            <a href="cards.html" className="inline-flex items-center space-x-2 text-xs font-black uppercase tracking-widest text-zinc-500 hover:text-rasta-gold transition-colors">
                                <i data-lucide="credit-card" className="h-3.5 w-3.5"></i>
                                <span>Matrix Cards</span>
                            </a>
                        </div>
                        <p className="text-zinc-700 font-mono text-[10px] tracking-[0.4em] uppercase mb-12">SYS.AUTH.001 &bull; STAKEHOLDER MATRIX &bull; BRAMPTON DC</p>
                        <div className="flex justify-center space-x-8">
                             <div className="h-1 w-16 bg-rasta-green/20 rounded-full"></div>
                             <div className="h-1 w-16 bg-rasta-gold/20 rounded-full"></div>
                             <div className="h-1 w-16 bg-rasta-red/20 rounded-full"></div>
                        </div>
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
