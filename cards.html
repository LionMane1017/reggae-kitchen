<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reggae Kitchen | Business Card Mockup Engine</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Stable CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rasta-red': '#CE1126',
                        'rasta-green': '#009B3A',
                        'rasta-gold': '#FCD116',
                        'obsidian-dark': '#0B0B0B',
                        'gold-leaf': '#D4AF37',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.4', filter: 'drop-shadow(0 0 10px rgba(252, 209, 22, 0.2))' },
                            '50%': { opacity: '1', filter: 'drop-shadow(0 0 25px rgba(252, 209, 22, 0.6))' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #060606;
            color: #f3f4f6;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient noise overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
        }

        .card-perspective {
            perspective: 2000px;
        }

        .card-inner {
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* Mockup Background Environments */
        .bg-studio {
            background: radial-gradient(circle at center, #16171a 0%, #08080a 100%);
        }
        .bg-concrete {
            background-image: linear-gradient(135deg, rgba(25,25,25,0.95) 0%, rgba(15,15,15,0.98) 100%), url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
        }
        .bg-wood {
            background-image: linear-gradient(135deg, rgba(10,10,10,0.85) 0%, rgba(5,5,5,0.95) 100%), url('https://images.unsplash.com/photo-1541123437800-1bb1317badc2?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
        }

        /* Print Optimization Styles */
        @media print {
            .print-hidden {
                display: none !important;
            }
            body {
                background: transparent !important;
                color: #000000 !important;
            }
            body::before {
                display: none !important;
                content: none !important;
            }
            .min-h-screen {
                padding: 0 !important;
                margin: 0 !important;
                min-height: auto !important;
                display: block !important;
            }
            .grid {
                display: block !important;
                width: 100% !important;
            }
            .lg\:col-span-8 {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 auto !important;
                width: 100% !important;
                max-width: 100% !important;
            }
            .card-perspective {
                margin: 40px auto !important;
                max-width: 520px !important;
                perspective: none !important;
            }
            .card-inner {
                transform: none !important;
                transform-style: flat !important;
            }
            .card-back {
                transform: none !important;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- HAND-CODED INLINE SVGS ---
        const FlameIcon = () => (
            <svg className="w-10 h-10 text-rasta-red animate-pulse-glow" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        );

        const CanadianSeal = () => (
            <svg className="w-10 h-10 text-rasta-gold opacity-80" viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="50" cy="50" r="43" strokeDasharray="3,3" />
                <path d="M50 20 L53 38 L71 38 L56 49 L62 67 L50 56 L38 67 L44 49 L29 38 L47 38 Z" fill="currentColor" fillOpacity="0.15"/>
                <text x="50" y="80" textAnchor="middle" fontSize="6.5" fontWeight="bold" fill="currentColor" letterSpacing="1">APPROVED</text>
                <text x="50" y="27" textAnchor="middle" fontSize="6.5" fontWeight="bold" fill="currentColor" letterSpacing="1">CANADA</text>
            </svg>
        );

        const LoblawsEmblem = () => (
            <svg className="w-8 h-8 text-rasta-green opacity-80" viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="4">
                <rect x="20" y="20" width="60" height="60" rx="12" />
                <circle cx="50" cy="50" r="12" />
                <text x="50" y="14" textAnchor="middle" fontSize="9" fontWeight="black" fill="currentColor">VANGUARD</text>
            </svg>
        );

        const PhoneIcon = () => (
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.387a12.035 12.035 0 01-7.108-7.108c-.115-.44.05-1.213.387-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
            </svg>
        );

        const MailIcon = () => (
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
        );

        const GlobeIcon = () => (
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9s2.015-9 4.5-9m0 0a9.004 9.004 0 018.716 2.253M12 3a9.004 9.004 0 00-8.716 2.253m0 0A9.004 9.004 0 0012 12m0 0c2.485 0 4.5-4.03 4.5-9M12 12c-2.485 0-4.5-4.03-4.5-9" />
            </svg>
        );

        const PinIcon = () => (
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25s-7.5-4.108-7.5-11.25a9 9 0 0118 0z" />
            </svg>
        );

        const MainApp = () => {
            const [cardData, setCardData] = useState({
                name: "WAYNE REID",
                title: "Founding Architect & Master Chef",
                phone: "(255) 369-1017",
                email: "wayne@reggaekitchen.com",
                website: "store.reggaekitchen.com",
                location: "Brampton, Ontario, Canada",
                motto: "Eye-tahl is Vital",
                certNo: "Sovereign Cert No. 369-1017"
            });

            const [style, setStyle] = useState('obsidian'); // obsidian, organic, platinum
            const [environment, setEnvironment] = useState('studio'); // studio, concrete, wood
            const [flipped, setFlipped] = useState(false);
            const [layoutMode, setLayoutMode] = useState('single'); // single, double, stack
            const [lightPos, setLightPos] = useState({ x: 50, y: 50 });
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [flipped, style, environment, layoutMode, isMobileMenuOpen]);

            // Spotlight interaction logic
            const handleMouseMove = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                setLightPos({ x, y });
            };

            const cardClasses = {
                obsidian: "bg-[#0b0b0b] text-white border-white/10 shadow-[0_25px_60px_rgba(0,0,0,0.9)]",
                organic: "bg-[#FAF7F2] text-zinc-900 border-amber-900/10 shadow-[0_25px_60px_rgba(40,30,20,0.25)]",
                platinum: "bg-gradient-to-br from-[#202124] to-[#0d0e10] text-white border-zinc-700/50 shadow-[0_25px_60px_rgba(0,0,0,0.9)]"
            };

            const renderCardFront = (isStackChild = false, stackOffset = 0, extraClass = '') => (
                <div 
                    onMouseMove={handleMouseMove}
                    style={{
                        transform: isStackChild ? `translate(${stackOffset}px, ${stackOffset}px) rotate(${stackOffset * 0.5}deg)` : 'none',
                        zIndex: 10 - stackOffset
                    }}
                    className={`absolute inset-0 rounded-[24px] p-6 flex flex-col justify-between overflow-hidden border transition-all duration-500 card-face
                        ${cardClasses[style]} ${extraClass}
                    `}>
                    
                    {/* Spotlight overlay */}
                    <div 
                        className="absolute inset-0 pointer-events-none opacity-40 mix-blend-overlay transition-opacity duration-300"
                        style={{
                            background: `radial-gradient(circle at ${lightPos.x}% ${lightPos.y}%, rgba(255,255,255,0.25) 0%, transparent 60%)`
                        }}
                    />

                    {/* Styled backgrounds */}
                    {style === 'obsidian' && (
                        <div className="absolute inset-0 opacity-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-rasta-gold via-rasta-red to-transparent"></div>
                    )}
                    {style === 'organic' && (
                        <div className="absolute inset-0 opacity-[0.03] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-amber-900 via-transparent to-transparent"></div>
                    )}
                    {style === 'platinum' && (
                        <div className="absolute inset-0 opacity-[0.08] bg-[linear-gradient(45deg,rgba(0,155,58,0.2),rgba(252,209,22,0.2),rgba(206,17,38,0.2))]"></div>
                    )}

                    {/* Front: Brand */}
                    <div className="flex justify-between items-start relative z-10">
                        <div className="flex items-center space-x-2.5">
                            <FlameIcon />
                            <div>
                                <h2 className={`font-black text-lg tracking-widest leading-none ${style === 'organic' ? 'text-zinc-900' : 'text-white'}`}>
                                    REGGAE <span className="text-rasta-gold font-black">KITCHEN</span>
                                </h2>
                                <span className={`text-[8px] tracking-[0.35em] uppercase font-black block mt-1 ${style === 'organic' ? 'text-zinc-500' : 'text-zinc-400'}`}>
                                    Wayne Reid Legacy
                                </span>
                            </div>
                        </div>
                        <CanadianSeal />
                    </div>

                    {/* Front: Slogan */}
                    <div className="my-auto relative z-10">
                        <p className={`text-2xl md:text-3xl font-black italic tracking-tighter uppercase leading-none ${style === 'organic' ? 'text-rasta-red' : 'text-rasta-gold'}`}>
                            &ldquo;{cardData.motto}&rdquo;
                        </p>
                    </div>

                    {/* Front: Footer Details */}
                    <div className="flex justify-between items-end relative z-10">
                        <div>
                            <p className={`text-sm font-black uppercase tracking-widest ${style === 'organic' ? 'text-zinc-900' : 'text-white'}`}>
                                {cardData.name}
                            </p>
                            <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mt-0.5">
                                {cardData.title}
                            </p>
                        </div>
                        <span className="text-[8px] font-mono opacity-50 uppercase tracking-widest">
                            {cardData.certNo}
                        </span>
                    </div>
                </div>
            );

            const renderCardBack = (extraClass = '') => (
                <div className={`absolute inset-0 rounded-[24px] p-6 flex flex-col justify-between overflow-hidden border transition-all duration-500 card-face card-back
                    ${style === 'obsidian' ? 'bg-[#0f0f0f] text-white border-white/10' : ''}
                    ${style === 'organic' ? 'bg-[#f4ecd8] text-[#1a1a1a] border-amber-900/15' : ''}
                    ${style === 'platinum' ? 'bg-[#151619] text-white border-zinc-700/50' : ''}
                    ${extraClass}
                `}>
                    
                    <div className="absolute inset-0 opacity-5 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>

                    {/* Back: Brand details */}
                    <div className="flex justify-between items-center relative z-10 border-b border-white/10 pb-3">
                        <span className={`text-[8.5px] uppercase tracking-[0.2em] font-black ${style === 'organic' ? 'text-zinc-600' : 'text-zinc-400'}`}>
                            Official Contact Credentials
                        </span>
                        <LoblawsEmblem />
                    </div>

                    {/* Back: Contact Grid */}
                    <div className="grid grid-cols-2 gap-4 my-auto relative z-10">
                        <div className="space-y-3">
                            <div className="flex items-center space-x-2.5">
                                <div className="text-rasta-gold p-1 bg-white/5 rounded-md"><PhoneIcon /></div>
                                <div>
                                    <span className="block text-[7px] uppercase font-bold text-zinc-500 tracking-wider">Phone Number</span>
                                    <span className={`text-[11px] font-black font-mono tracking-tight ${style === 'organic' ? 'text-black' : 'text-white'}`}>{cardData.phone}</span>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2.5">
                                <div className="text-rasta-gold p-1 bg-white/5 rounded-md"><MailIcon /></div>
                                <div>
                                    <span className="block text-[7px] uppercase font-bold text-zinc-500 tracking-wider">Email Address</span>
                                    <span className={`text-[11px] font-black font-mono tracking-tight ${style === 'organic' ? 'text-black' : 'text-white'}`}>{cardData.email}</span>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-3 pl-4 border-l border-white/5">
                            <div className="flex items-center space-x-2.5">
                                <div className="text-rasta-gold p-1 bg-white/5 rounded-md"><GlobeIcon /></div>
                                <div>
                                    <span className="block text-[7px] uppercase font-bold text-zinc-500 tracking-wider">Website</span>
                                    <span className="text-[11px] font-black font-mono text-rasta-gold tracking-tight">{cardData.website}</span>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2.5">
                                <div className="text-rasta-gold p-1 bg-white/5 rounded-md"><PinIcon /></div>
                                <div>
                                    <span className="block text-[7px] uppercase font-bold text-zinc-500 tracking-wider">Office Location</span>
                                    <span className={`text-[9.5px] font-bold uppercase tracking-tighter block leading-tight ${style === 'organic' ? 'text-zinc-800' : 'text-zinc-300'}`}>{cardData.location}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Back: Footer Accent */}
                    <div className="flex justify-between items-center relative z-10 border-t border-white/10 pt-3">
                        <span className="text-[7.5px] font-mono text-zinc-500 uppercase tracking-widest">
                            Wayne Reid Brand Protocol Active
                        </span>
                        <div className="flex space-x-1.5">
                            <div className="w-1.5 h-1.5 rounded-full bg-rasta-green"></div>
                            <div className="w-1.5 h-1.5 rounded-full bg-rasta-gold"></div>
                            <div className="w-1.5 h-1.5 rounded-full bg-rasta-red"></div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col items-center justify-center relative select-none pt-32 pb-24">
                    <div className="w-full h-1.5 bg-gradient-to-r from-rasta-green via-rasta-gold to-rasta-red fixed top-0 left-0 z-[500] print-hidden" />
                    
                    {/* Navigation Bar */}
                    <nav className="fixed top-1.5 left-0 w-full z-[500] bg-black/60 backdrop-blur-2xl border-b border-white/5 py-5 shadow-2xl print-hidden">
                        <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                            <div className="flex items-center space-x-4"><i data-lucide="flame" className="text-rasta-gold h-10 w-10 animate-pulse-glow"></i><h1 className="text-2xl font-black text-white uppercase tracking-tighter">Reggae <span className="text-gradient-gold">Kitchen</span></h1></div>
                            <div className="flex items-center space-x-6">
                                <a href="lore.html" className="hidden md:flex text-zinc-500 hover:text-white text-[10px] font-black uppercase tracking-[0.3em] items-center">Corporate Lore</a>
                                <a href="index.html" className="hidden md:block text-rasta-gold hover:text-white text-[11px] font-black uppercase tracking-[0.2em] border-2 border-rasta-gold/30 px-8 py-3 rounded-full transition-all shadow-lg hover:bg-rasta-gold hover:text-black">Back to Store</a>
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-3 bg-white/5 rounded-full hover:bg-rasta-gold text-white hover:text-black transition-all border border-white/10 md:hidden flex items-center justify-center">
                                    <span key={isMobileMenuOpen ? "close" : "open"} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${isMobileMenuOpen ? 'x' : 'menu'}" class="h-5 w-5"></i>` }} className="h-5 w-5 flex items-center justify-center"></span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[450] bg-black/95 backdrop-blur-3xl md:hidden flex flex-col justify-center items-center space-y-10 animate-slide-up-fade">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-rasta-green via-rasta-gold to-rasta-red"></div>
                            
                            <a href="index.html" onClick={() => setIsMobileMenuOpen(false)} className="text-3xl font-black uppercase tracking-tighter text-white hover:text-rasta-gold transition-colors flex items-center space-x-4">
                                <i data-lucide="shopping-cart" className="h-8 w-8 text-rasta-green"></i>
                                <span>Back to Store</span>
                            </a>
                            
                            <a href="lore.html" onClick={() => setIsMobileMenuOpen(false)} className="text-3xl font-black uppercase tracking-tighter text-white hover:text-rasta-gold transition-colors flex items-center space-x-4">
                                <i data-lucide="book-open" className="h-8 w-8 text-rasta-gold"></i>
                                <span>Corporate Lore</span>
                            </a>
                        </div>
                    )}

                    {/* Header */}
                    <header className="text-center mb-10 w-full max-w-4xl mt-8 print-hidden">
                        <div className="inline-flex items-center space-x-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full mb-4">
                            <span className="w-2.5 h-2.5 rounded-full bg-rasta-green animate-pulse"></span>
                            <span className="text-[10px] uppercase font-black tracking-widest text-zinc-400">Brand Collateral Studio</span>
                        </div>
                        <h1 className="text-5xl md:text-7xl font-black text-white uppercase tracking-tighter leading-none mb-3">
                            Sovereign <span className="text-transparent bg-clip-text bg-gradient-to-r from-rasta-gold via-yellow-400 to-rasta-red">Matrix Cards</span>
                        </h1>
                        <p className="text-zinc-400 max-w-2xl mx-auto text-sm md:text-base font-medium">
                            Perfected physical business card templates representing Wayne Reid. Zero dependencies, absolute compiler protection, high-fidelity mockups.
                        </p>
                    </header>

                    {/* Workspace Matrix */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 w-full max-w-7xl items-stretch relative z-10">
                        
                        {/* LEFT: Live Stage */}
                        <div className={`lg:col-span-8 flex flex-col items-center justify-center rounded-[40px] p-8 md:p-16 border border-white/10 shadow-inner relative transition-all duration-700
                            ${environment === 'studio' ? 'bg-studio' : ''}
                            ${environment === 'concrete' ? 'bg-concrete' : ''}
                            ${environment === 'wood' ? 'bg-wood' : ''}
                        `}>
                            
                            <div className="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60 pointer-events-none rounded-[40px]" />

                            <div className="absolute top-6 left-8 bg-black/60 border border-white/10 px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest text-zinc-400 backdrop-blur-md relative z-20 print-hidden">
                                Surface: {environment}
                            </div>

                            {/* card scale and dimensions */}
                            <div className="w-full max-w-[520px] aspect-[1.75/1] card-perspective mb-10 relative z-10 cursor-pointer">
                                {layoutMode === 'single' && (
                                    <div className={`card-inner w-full h-full relative ${flipped ? 'card-flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                                        {renderCardFront(false, 0, flipped ? 'print-hidden' : '')}
                                        {renderCardBack(!flipped ? 'print-hidden' : '')}
                                    </div>
                                )}

                                {layoutMode === 'double' && (
                                    <div className="w-full h-full grid grid-cols-1 md:grid-cols-2 gap-6 scale-95 md:scale-100">
                                        <div className="relative aspect-[1.75/1] card-inner">
                                            {renderCardFront()}
                                        </div>
                                        <div className="relative aspect-[1.75/1] card-inner">
                                            {renderCardBack()}
                                        </div>
                                    </div>
                                )}

                                {layoutMode === 'stack' && (
                                    <div className="w-full h-full relative flex items-center justify-center scale-95 md:scale-105" onClick={() => setFlipped(!flipped)}>
                                        {flipped ? (
                                            <div className="w-full h-full relative">
                                                {renderCardBack()}
                                            </div>
                                        ) : (
                                            <div className="w-full h-full relative">
                                                {renderCardFront(true, 16)}
                                                {renderCardFront(true, 8)}
                                                {renderCardFront(false, 0)}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* View controls */}
                            <div className="flex flex-wrap gap-3 justify-center relative z-20 print-hidden">
                                <button onClick={() => setFlipped(!flipped)} className="bg-white/10 hover:bg-white/20 text-white font-black text-xs uppercase tracking-widest px-6 py-3 rounded-xl border border-white/10 transition-all flex items-center">
                                    <svg className="w-3.5 h-3.5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                                    </svg>
                                    Flip Side
                                </button>
                                <button onClick={() => setLayoutMode(layoutMode === 'single' ? 'double' : layoutMode === 'double' ? 'stack' : 'single')} className="bg-white/5 hover:bg-white/10 text-white font-black text-xs uppercase tracking-widest px-6 py-3 rounded-xl border border-white/10 transition-all">
                                    Display Layout: {layoutMode.toUpperCase()}
                                </button>
                            </div>
                        </div>

                        {/* RIGHT: Live Control Board */}
                        <div className="lg:col-span-4 glass-card p-8 rounded-[40px] border border-white/10 flex flex-col justify-between print-hidden">
                            <div className="space-y-6">
                                <h3 className="text-2xl font-black text-white uppercase tracking-tight pb-4 border-b border-white/10 flex items-center">
                                    <span className="w-2.5 h-2.5 rounded-full bg-rasta-gold mr-3 animate-pulse"></span> Design Panel
                                </h3>

                                {/* Style picker */}
                                <div>
                                    <label className="block text-[10px] uppercase font-black text-zinc-400 tracking-wider mb-3">Card Print Texture</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        <button onClick={() => setStyle('obsidian')} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${style === 'obsidian' ? 'bg-rasta-gold text-black border-rasta-gold' : 'bg-white/5 text-white border-white/10 hover:bg-white/10'}`}>
                                            Obsidian
                                        </button>
                                        <button onClick={() => setStyle('organic')} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${style === 'organic' ? 'bg-[#FAF7F2] text-black border-amber-200' : 'bg-white/5 text-white border-white/10 hover:bg-white/10'}`}>
                                            Organic
                                        </button>
                                        <button onClick={() => setStyle('platinum')} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${style === 'platinum' ? 'bg-zinc-800 text-white border-zinc-700' : 'bg-white/5 text-white border-white/10 hover:bg-white/10'}`}>
                                            Platinum
                                        </button>
                                    </div>
                                </div>

                                {/* Environment Picker */}
                                <div>
                                    <label className="block text-[10px] uppercase font-black text-zinc-400 tracking-wider mb-3">Mockup Backdrop</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        <button onClick={() => setEnvironment('studio')} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${environment === 'studio' ? 'bg-white text-black border-white' : 'bg-white/5 text-zinc-400 border-white/10 hover:bg-white/10'}`}>
                                            Studio
                                        </button>
                                        <button onClick={() => setEnvironment('concrete')} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${environment === 'concrete' ? 'bg-zinc-700 text-white border-zinc-600' : 'bg-white/5 text-zinc-400 border-white/10 hover:bg-white/10'}`}>
                                            Concrete
                                        </button>
                                        <button onClick={() => setEnvironment('wood')} className={`py-3 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all border ${environment === 'wood' ? 'bg-amber-900 text-white border-amber-800' : 'bg-white/5 text-zinc-400 border-white/10 hover:bg-white/10'}`}>
                                            Wood
                                        </button>
                                    </div>
                                </div>

                                {/* Form Controls - Clear, Non-Technical English */}
                                <div className="space-y-4 pt-4 border-t border-white/5">
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Owner Name</label>
                                        <input type="text" value={cardData.name} onChange={e => setCardData({...cardData, name: e.target.value.toUpperCase()})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Job Title</label>
                                        <input type="text" value={cardData.title} onChange={e => setCardData({...cardData, title: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Phone Number</label>
                                        <input type="text" value={cardData.phone} onChange={e => setCardData({...cardData, phone: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Email Address</label>
                                        <input type="text" value={cardData.email} onChange={e => setCardData({...cardData, email: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Website Address</label>
                                        <input type="text" value={cardData.website} onChange={e => setCardData({...cardData, website: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Store Location</label>
                                        <input type="text" value={cardData.location} onChange={e => setCardData({...cardData, location: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Slogan Tagline</label>
                                        <input type="text" value={cardData.motto} onChange={e => setCardData({...cardData, motto: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] uppercase font-bold text-zinc-500 tracking-wider mb-1">Certificate Number</label>
                                        <input type="text" value={cardData.certNo} onChange={e => setCardData({...cardData, certNo: e.target.value})} className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white outline-none focus:border-rasta-gold" />
                                    </div>
                                </div>
                            </div>

                            <div className="pt-6 mt-6 border-t border-white/5">
                                <button onClick={() => window.print()} className="w-full bg-rasta-green hover:bg-green-600 text-white font-black text-xs uppercase tracking-widest py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02]">
                                    Export Card PDF / Specs
                                </button>
                            </div>
                        </div>

                    </div>

                    {/* Footer */}
                    <footer className="mt-16 text-center text-[10px] uppercase tracking-widest font-mono text-zinc-600 print-hidden">
                        <div className="mb-4 flex flex-wrap justify-center gap-6">
                            <a href="index.html" className="inline-flex items-center space-x-2 text-xs font-black uppercase tracking-widest text-zinc-500 hover:text-rasta-gold transition-colors">
                                <i data-lucide="shopping-cart" className="h-3.5 w-3.5"></i>
                                <span>Back to Store</span>
                            </a>
                            <a href="lore.html" className="inline-flex items-center space-x-2 text-xs font-black uppercase tracking-widest text-zinc-500 hover:text-rasta-gold transition-colors">
                                <i data-lucide="globe" className="h-3.5 w-3.5"></i>
                                <span>Corporate Lore</span>
                            </a>
                        </div>
                        <p className="mb-2">Design Node Verification &bull; Certified Authentic Rasta Theme Core &bull; Secure Protocol 369-1017</p>
                        <p className="text-[8px] text-zinc-800">Sovereign Domain Protection Active &bull; No Stalls &bull; No Squeezes</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
